name: CI/CD - Publish to Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Static Website
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get GitHub OIDC Token
        id: idtoken
        uses: actions/github-script@v7
        with:
          script: |
            return await core.getIDToken()
          result-encoding: string

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: upload

          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_SKY_02A27E403 }}
          github_id_token: ${{ steps.idtoken.outputs.result }}

          app_location: "/"
          api_location: ""
          output_location: "/"

          skip_app_build: true
          skip_api_build: true
